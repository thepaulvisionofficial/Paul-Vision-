<!DOCTYPE html>
<html>
<head>
<title>PaulVision AI - Join Waitlist</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;text-align:center;padding:50px;background:#0a0a0a;color:#fff}
input{padding:12px;margin:8px;width:80%;max-width:300px;border-radius:8px;border:none;background:#1a1a1a;color:#fff}
button{padding:12px 30px;background:#00ff88;border:none;border-radius:8px;color:#000;font-weight:bold;cursor:pointer;font-size:16px}
h1{color:#00ff88;font-size:2.5rem}
p{color:#ccc}
</style>
</head>
<body>
<h1>🚀 PaulVision AI</h1>
<p>We grow in vision</p>

<form id="leadForm">
<input type="text" id="name" placeholder="Your Name" required><br>
<input type="email" id="email" placeholder="Your Email" required><br>
<button type="submit">Join Waitlist</button>
</form>

<p style="color:#666;font-size:12px">© 2026 PaulVision AI</p>

<script>
document.getElementById('leadForm').addEventListener('submit', async function(e) {
e.preventDefault();
const name = document.getElementById('name').value;
const email = document.getElementById('email').value;
const webhookUrl = 'https://script.google.com/macros/s/AKfycbyesng5T_Kq-UwDjCEWUriMlMpLFnrCPQRULJJny0oNanfZQVc2Za6tezdhyJKot/exec';

await fetch(webhookUrl, {
method: 'POST',
mode: 'no-cors',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({name: name, email: email})
});

alert('You’re In! We’ll notify you when PaulVision AI launches 🚀');
document.getElementById('leadForm').reset();
});
</script>
</body>
</html>
